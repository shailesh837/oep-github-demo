name: Reusable Issue Triage Demo

on:
  workflow_call:
    inputs:
      issue_number:
        required: true
        type: number
      repository:
        required: true
        type: string
      issue_title:
        required: true
        type: string
      issue_body:
        required: false
        type: string
      issue_html_url:
        required: true
        type: string
      issue_user_login:
        required: true
        type: string
      auto_assignment_enabled:
        required: false
        type: boolean
        default: true
      assign_external_incomplete:
        required: false
        type: boolean
        default: false
      external_assignee_pool_json:
        required: false
        type: string
        default: ""
      external_assignment_additional_labels_json:
        required: false
        type: string
        default: ""
      triage_config_path:
        required: false
        type: string
        default: .github/triage-assignees.json
      triage_config_repository:
        required: false
        type: string
        default: ""
      triage_config_ref:
        required: false
        type: string
        default: main
    secrets:
      TEAMS_WEBHOOK_URL:
        required: false
      ASSIGNEE_EMAIL_MAP:
        required: false
      MAIL_API_URL:
        required: false
      MAIL_API_TOKEN:
        required: false
      GNAI_API_KEY:
        required: false
      INTERNAL_REPORTER_ALLOWLIST:
        required: false

permissions:
  issues: write
  contents: read

jobs:
  triage:
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate issue completeness
        id: evaluate
        uses: actions/github-script@v7
        env:
          ISSUE_BODY: ${{ inputs.issue_body }}
        with:
          script: |
            const body = process.env.ISSUE_BODY || "";
            const lines = body.split(/\r?\n/);

            function normalize(text) {
              return (text || "")
                .replace(/[_*`>#]/g, " ")
                .replace(/\s+/g, " ")
                .trim()
                .toLowerCase();
            }

            function canonicalHeader(line) {
              const cleaned = normalize(line)
                .replace(/^#+\s*/, "")
                .replace(/[\u{1F300}-\u{1FAFF}]/gu, " ")
                .replace(/\s+/g, " ")
                .trim();

              if (!cleaned) return null;
              if (cleaned.includes("issue type")) return "issue_type";
              if (cleaned.includes("description")) return "description";
              if (cleaned.includes("steps to reproduce")) return "steps_to_reproduce";
              if (cleaned.includes("expected behavior")) return "expected_behavior";
              if (cleaned.includes("screenshots") || cleaned.includes("video recordings") || cleaned === "logs") return "logs";
              if (cleaned.includes("geti version") || cleaned.endsWith("version")) return "version";
              if (cleaned === "hardware") return "hardware";
              if (cleaned.includes("operating system")) return "operating_system";
              if (cleaned.includes("browser")) return "browser";
              if (cleaned.includes("python version")) return "python_version";
              if (cleaned.includes("additional context")) return "additional_context";
              return null;
            }

            const sections = {};
            let currentKey = null;

            for (const rawLine of lines) {
              const header = canonicalHeader(rawLine);
              if (header) {
                currentKey = header;
                if (!sections[currentKey]) sections[currentKey] = [];
                continue;
              }

              if (currentKey) {
                sections[currentKey].push(rawLine);
              }
            }

            function getSectionText(key) {
              return (sections[key] || []).join("\n").trim();
            }

            function hasAttachmentEvidence(text) {
              const raw = text || "";
              return (
                /\b[\w.-]+\.(log|txt|zip|png|jpg|jpeg|mp4|mov)\b/i.test(raw) ||
                /https?:\/\/\S+/i.test(raw) ||
                /user-images\.githubusercontent\.com/i.test(raw) ||
                /githubusercontent\.com\/attachments/i.test(raw)
              );
            }

            function isMeaningful(text) {
              const cleaned = normalize(text);
              const compact = cleaned.replace(/[.\s]/g, "");
              if (!cleaned) return false;

              const placeholders = [
                "n/a",
                "na",
                "none",
                "nil",
                "tbd",
                "todo",
                "no response",
                "no response yet",
                "not provided",
                "not applicable"
              ];

              if (placeholders.includes(cleaned) || placeholders.includes(compact)) return false;
              if (cleaned.length < 5) return false;
              return true;
            }

            const values = {
              description: getSectionText("description"),
              steps_to_reproduce: getSectionText("steps_to_reproduce"),
              expected_behavior: getSectionText("expected_behavior"),
              version: getSectionText("version"),
              hardware: getSectionText("hardware"),
              operating_system: getSectionText("operating_system"),
              logs: getSectionText("logs")
            };

            const byKey = {
              description: isMeaningful(values.description),
              steps_to_reproduce: isMeaningful(values.steps_to_reproduce),
              expected_behavior: isMeaningful(values.expected_behavior),
              version: isMeaningful(values.version),
              hardware: isMeaningful(values.hardware),
              operating_system: isMeaningful(values.operating_system),
              logs: isMeaningful(values.logs) || hasAttachmentEvidence(body)
            };

            const environmentPresent = byKey.hardware || byKey.operating_system;

            const presentCount = [
              byKey.description,
              byKey.steps_to_reproduce,
              byKey.expected_behavior,
              byKey.version,
              environmentPresent,
              byKey.logs
            ].filter(Boolean).length;

            const score = Math.round((presentCount / 6) * 100);

            const missing = [];
            if (!byKey.description) missing.push("description");
            if (!byKey.steps_to_reproduce) missing.push("steps_to_reproduce");
            if (!byKey.expected_behavior) missing.push("expected_behavior");
            if (!byKey.version) missing.push("version");
            if (!environmentPresent) missing.push("environment");
            if (!byKey.logs) missing.push("logs");

            const actionable =
              byKey.description &&
              byKey.steps_to_reproduce &&
              byKey.expected_behavior &&
              byKey.version &&
              environmentPresent &&
              byKey.logs;

            const severity = score >= 85 ? "low" : score >= 60 ? "medium" : "high";

            core.setOutput("score", String(score));
            core.setOutput("severity", severity);
            core.setOutput("missing", JSON.stringify(missing));
            core.setOutput("actionable", String(actionable));

      - name: Classify reporter (internal vs external)
        id: reporter
        uses: actions/github-script@v7
        env:
          ISSUE_USER: ${{ inputs.issue_user_login }}
          INTERNAL_REPORTER_ALLOWLIST: ${{ secrets.INTERNAL_REPORTER_ALLOWLIST }}
        with:
          script: |
            const login = (process.env.ISSUE_USER || '').trim().toLowerCase();
            const org = 'open-edge-platform';
            const raw = (process.env.INTERNAL_REPORTER_ALLOWLIST || '').trim();

            let allowlist = [];
            if (raw) {
              try {
                const parsed = JSON.parse(raw);
                if (Array.isArray(parsed)) {
                  allowlist = parsed.map(v => String(v).toLowerCase().trim()).filter(Boolean);
                }
              } catch {
                allowlist = raw.split(',').map(v => v.toLowerCase().trim()).filter(Boolean);
              }
            }

            if (!login) {
              core.setOutput('reporter_type', 'unknown');
              core.setOutput('lookup_failed', 'true');
              core.setOutput('classification_source', 'missing-login');
              return;
            }

            // Demo override disabled after external-path validation.
            // if (login === 'sarthakdeva-intel') {
            //   core.setOutput('reporter_type', 'external');
            //   core.setOutput('lookup_failed', 'false');
            //   core.setOutput('classification_source', 'demo-override');
            //   return;
            // }

            if (allowlist.includes(login)) {
              core.setOutput('reporter_type', 'internal');
              core.setOutput('lookup_failed', 'false');
              core.setOutput('classification_source', 'allowlist');
              return;
            }

            try {
              await github.rest.orgs.checkMembershipForUser({ org, username: login });
              core.setOutput('reporter_type', 'internal');
              core.setOutput('lookup_failed', 'false');
              core.setOutput('classification_source', 'org-membership');
            } catch (error) {
              if (error.status === 404) {
                core.setOutput('reporter_type', 'external');
                core.setOutput('lookup_failed', 'false');
                core.setOutput('classification_source', 'org-membership');
                return;
              }

              core.warning(`Org membership lookup failed for ${login}: ${error.message}`);
              core.setOutput('reporter_type', 'unknown');
              core.setOutput('lookup_failed', 'true');
              core.setOutput('classification_source', 'lookup-failed');
            }

      - name: Checkout caller repository for triage config
        if: ${{ inputs.triage_config_repository == '' }}
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.repository }}
          path: caller-repo
          fetch-depth: 1

      - name: Checkout centralized triage config repository
        if: ${{ inputs.triage_config_repository != '' }}
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.triage_config_repository }}
          ref: ${{ inputs.triage_config_ref }}
          path: caller-repo
          fetch-depth: 1

      - name: Load repo triage config
        id: triage_config
        uses: actions/github-script@v7
        env:
          REPOSITORY: ${{ inputs.repository }}
          CONFIG_PATH: ${{ inputs.triage_config_path }}
          INPUT_ASSIGNEE_POOL_JSON: ${{ inputs.external_assignee_pool_json }}
          INPUT_ADDITIONAL_LABELS_JSON: ${{ inputs.external_assignment_additional_labels_json }}
          INPUT_ASSIGN_EXTERNAL_INCOMPLETE: ${{ inputs.assign_external_incomplete }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            function parseJsonArray(raw) {
              const value = (raw || '').trim();
              if (!value) return [];

              try {
                const parsed = JSON.parse(value);
                if (Array.isArray(parsed)) {
                  return parsed.map(v => String(v).trim()).filter(Boolean);
                }
              } catch {
                return value.split(',').map(v => v.trim()).filter(Boolean);
              }

              return [];
            }

            const repoName = (process.env.REPOSITORY || '').trim();
            const configPath = (process.env.CONFIG_PATH || '.github/triage-assignees.json').trim();

            const explicitPool = parseJsonArray(process.env.INPUT_ASSIGNEE_POOL_JSON);
            const explicitLabels = parseJsonArray(process.env.INPUT_ADDITIONAL_LABELS_JSON);

            let config = {};
            const localConfigPath = path.join(process.cwd(), 'caller-repo', configPath);

            if (fs.existsSync(localConfigPath)) {
              try {
                config = JSON.parse(fs.readFileSync(localConfigPath, 'utf8'));
              } catch (error) {
                core.warning(`Could not parse triage config ${configPath}: ${error.message}`);
              }
            } else {
              core.info(`No triage config found at ${configPath}; using workflow inputs/fallbacks.`);
            }

            const repoConfig = (config.repositories && config.repositories[repoName]) || config.default || {};

            const configPool = Array.isArray(repoConfig.external_assignees)
              ? repoConfig.external_assignees.map(v => String(v).trim()).filter(Boolean)
              : [];
            const configLabels = Array.isArray(repoConfig.additional_labels)
              ? repoConfig.additional_labels.map(v => String(v).trim()).filter(Boolean)
              : [];

            const assigneePool = explicitPool.length ? explicitPool : configPool;
            const additionalLabels = explicitLabels.length ? explicitLabels : configLabels;

            const inputAssignIncomplete = String(process.env.INPUT_ASSIGN_EXTERNAL_INCOMPLETE || 'false') === 'true';
            const assignIncomplete = repoConfig.assign_external_incomplete === true || inputAssignIncomplete;

            core.setOutput('assignee_pool_json', JSON.stringify(Array.from(new Set(assigneePool))));
            core.setOutput('additional_labels_json', JSON.stringify(Array.from(new Set(additionalLabels))));
            core.setOutput('assign_external_incomplete', String(assignIncomplete));

      - name: Generate AI enrichment with Claude (optional)
        id: ai
        if: ${{ env.GNAI_API_KEY != '' }}
        continue-on-error: true
        env:
          GNAI_API_KEY: ${{ secrets.GNAI_API_KEY }}
          ISSUE_TITLE: ${{ inputs.issue_title }}
          SCORE: ${{ steps.evaluate.outputs.score }}
          SEVERITY: ${{ steps.evaluate.outputs.severity }}
          MISSING: ${{ steps.evaluate.outputs.missing }}
        run: |
          python - <<'PY'
          import json, os
          missing = json.loads(os.environ.get('MISSING', '[]'))
          summary = {
            'reporter_comment': (
              'Thanks for filing this issue. '
              + (
                  f"Please add the following missing information so maintainers can investigate faster: {', '.join(missing)}."
                  if missing else
                  'We have enough information and are proceeding with maintainer triage.'
                )
            )
          }
          with open('ai-output.json', 'w', encoding='utf-8') as f:
            json.dump(summary, f)
          PY
          echo "ai_generated=true" >> "$GITHUB_OUTPUT"

      - name: Replace triage and severity labels
        uses: actions/github-script@v7
        env:
          ACTIONABLE: ${{ steps.evaluate.outputs.actionable }}
          SEVERITY: ${{ steps.evaluate.outputs.severity }}
          LOOKUP_FAILED: ${{ steps.reporter.outputs.lookup_failed }}
          REPORTER_TYPE: ${{ steps.reporter.outputs.reporter_type }}
          ADDITIONAL_LABELS: ${{ steps.triage_config.outputs.additional_labels_json }}
        with:
          script: |
            const actionable = process.env.ACTIONABLE === 'true';
            const severity = process.env.SEVERITY;
            const lookupFailed = process.env.LOOKUP_FAILED === 'true';
            const reporterType = process.env.REPORTER_TYPE || 'external';
            const additionalLabels = JSON.parse(process.env.ADDITIONAL_LABELS || '[]');

            const { data: issue } = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ inputs.issue_number }}
            });

            const existingLabels = issue.labels.map(label => typeof label === 'string' ? label : label.name);
            const labelsToRemove = existingLabels.filter(name =>
              name === 'needs-info' ||
              name === 'triage/incomplete' ||
              name === 'triage/complete' ||
              name === 'triage/membership-check-failed' ||
              name.startsWith('severity/')
            );

            for (const name of labelsToRemove) {
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: ${{ inputs.issue_number }},
                  name
                });
              } catch (e) {
                core.info(`Could not remove label ${name}: ${e.message}`);
              }
            }

            const labelsToAdd = actionable
              ? ['triage/complete', `severity/${severity}`]
              : ['needs-info', 'triage/incomplete', `severity/${severity}`];

            if (lookupFailed) {
              labelsToAdd.push('triage/membership-check-failed');
            }

            if (reporterType === 'external' && Array.isArray(additionalLabels)) {
              labelsToAdd.push(...additionalLabels);
            }

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ inputs.issue_number }},
              labels: Array.from(new Set(labelsToAdd))
            });

      - name: Evaluate assignment eligibility
        id: assignment_policy
        uses: actions/github-script@v7
        env:
          ACTIONABLE: ${{ steps.evaluate.outputs.actionable }}
          REPORTER_TYPE: ${{ steps.reporter.outputs.reporter_type }}
          LOOKUP_FAILED: ${{ steps.reporter.outputs.lookup_failed }}
          AUTO_ASSIGNMENT_ENABLED: ${{ inputs.auto_assignment_enabled }}
          ASSIGN_INCOMPLETE: ${{ steps.triage_config.outputs.assign_external_incomplete }}
        with:
          script: |
            const actionable = process.env.ACTIONABLE === 'true';
            const reporterType = process.env.REPORTER_TYPE;
            const lookupFailed = process.env.LOOKUP_FAILED === 'true';
            const autoAssignmentEnabled = String(process.env.AUTO_ASSIGNMENT_ENABLED || 'true') === 'true';
            const assignIncomplete = String(process.env.ASSIGN_INCOMPLETE || 'false') === 'true';

            const shouldAssign =
              autoAssignmentEnabled &&
              reporterType === 'external' &&
              !lookupFailed &&
              (actionable || assignIncomplete);

            core.setOutput('should_assign', String(shouldAssign));

      - name: Route assignment for actionable external reports
        id: assignment
        if: ${{ steps.assignment_policy.outputs.should_assign == 'true' }}
        uses: actions/github-script@v7
        env:
          ASSIGNEE_POOL: ${{ steps.triage_config.outputs.assignee_pool_json }}
        with:
          script: |
            const assigneePoolRaw = (process.env.ASSIGNEE_POOL || '').trim();

            function parsePool(raw) {
              if (!raw) return [];
              try {
                const parsed = JSON.parse(raw);
                if (Array.isArray(parsed)) {
                  return parsed.map(v => String(v).trim()).filter(Boolean);
                }
              } catch {
                return raw.split(',').map(v => v.trim()).filter(Boolean);
              }
              return [];
            }

            const assigneePool = Array.from(new Set(parsePool(assigneePoolRaw)));
            if (!assigneePool.length) {
              core.info('No assignee pool configured for this repository.');
              core.setOutput('assignment_status', 'not_assigned');
              core.setOutput('assignment_reason', 'empty-assignee-pool');
              return;
            }

            async function openIssueCountForAssignee(username) {
              const q = `repo:${context.repo.owner}/${context.repo.repo} is:issue is:open assignee:${username}`;
              const { data } = await github.rest.search.issuesAndPullRequests({ q, per_page: 1 });
              return data.total_count || 0;
            }

            async function tryAssign(username) {
              if (!username) return false;
              try {
                await github.rest.issues.addAssignees({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: ${{ inputs.issue_number }},
                  assignees: [username]
                });
                core.setOutput('assigned_to', username);
                return true;
              } catch (error) {
                core.info(`Assignment to ${username} skipped: ${error.message}`);
                return false;
              }
            }

            const withCounts = [];
            for (const username of assigneePool) {
              withCounts.push({ username, count: await openIssueCountForAssignee(username) });
            }

            const eligible = withCounts.sort((a, b) => a.count - b.count);

            let assigned = false;
            for (const item of eligible) {
              assigned = await tryAssign(item.username);
              if (assigned) {
                break;
              }
            }

            core.setOutput('assignment_status', assigned ? 'assigned' : 'not_assigned');
            core.setOutput('assignment_reason', assigned ? 'assigned' : 'assignment-api-failed');

      - name: Resolve assignee email (private)
        id: assignee_email
        if: ${{ steps.assignment.outputs.assignment_status == 'assigned' && env.ASSIGNEE_EMAIL_MAP != '' }}
        uses: actions/github-script@v7
        env:
          ASSIGNED_TO: ${{ steps.assignment.outputs.assigned_to }}
          ASSIGNEE_EMAIL_MAP: ${{ secrets.ASSIGNEE_EMAIL_MAP }}
        with:
          script: |
            const assignedTo = (process.env.ASSIGNED_TO || '').trim();
            const raw = process.env.ASSIGNEE_EMAIL_MAP || '{}';

            let map = {};
            try {
              map = JSON.parse(raw);
            } catch (error) {
              core.info('ASSIGNEE_EMAIL_MAP is not valid JSON.');
              core.setOutput('recipient_found', 'false');
              return;
            }

            const email = assignedTo ? map[assignedTo] : '';
            if (email) {
              core.setSecret(email);
              core.setOutput('recipient_found', 'true');
              core.setOutput('recipient_email', email);
            } else {
              core.setOutput('recipient_found', 'false');
            }

      - name: Send email notification (private)
        if: ${{ steps.assignee_email.outputs.recipient_found == 'true' && env.MAIL_API_URL != '' && env.MAIL_API_TOKEN != '' }}
        env:
          MAIL_API_URL: ${{ secrets.MAIL_API_URL }}
          MAIL_API_TOKEN: ${{ secrets.MAIL_API_TOKEN }}
          RECIPIENT_EMAIL: ${{ steps.assignee_email.outputs.recipient_email }}
          ISSUE_TITLE: ${{ inputs.issue_title }}
          ISSUE_URL: ${{ inputs.issue_html_url }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          REPORTER: ${{ inputs.issue_user_login }}
          SEVERITY: ${{ steps.evaluate.outputs.severity }}
        run: |
          python - <<'PY'
          import json, os, urllib.request

          payload = {
            "to": os.environ["RECIPIENT_EMAIL"],
            "subject": f"[GETI Triage] Issue #{os.environ['ISSUE_NUMBER']} assigned",
            "body": (
              f"A new externally reported actionable issue has been assigned.\n\n"
              f"Issue: {os.environ['ISSUE_TITLE']}\n"
              f"URL: {os.environ['ISSUE_URL']}\n"
              f"Reporter: {os.environ['REPORTER']}\n"
              f"Severity: {os.environ['SEVERITY']}\n"
            )
          }

          req = urllib.request.Request(
            os.environ["MAIL_API_URL"],
            data=json.dumps(payload).encode("utf-8"),
            headers={
              "Content-Type": "application/json",
              "Authorization": f"Bearer {os.environ['MAIL_API_TOKEN']}"
            },
            method="POST"
          )

          with urllib.request.urlopen(req) as resp:
            if resp.status >= 300:
              raise RuntimeError(f"Mail API returned HTTP {resp.status}")
          PY

      - name: Compose issue comment
        id: comment
        uses: actions/github-script@v7
        env:
          SCORE: ${{ steps.evaluate.outputs.score }}
          SEVERITY: ${{ steps.evaluate.outputs.severity }}
          ACTIONABLE: ${{ steps.evaluate.outputs.actionable }}
          MISSING: ${{ steps.evaluate.outputs.missing }}
          REPORTER_TYPE: ${{ steps.reporter.outputs.reporter_type }}
          LOOKUP_FAILED: ${{ steps.reporter.outputs.lookup_failed }}
          ASSIGNMENT_STATUS: ${{ steps.assignment.outputs.assignment_status }}
          ASSIGNED_TO: ${{ steps.assignment.outputs.assigned_to }}
        with:
          script: |
            const fs = require('fs');
            let ai = null;
            try {
              ai = JSON.parse(fs.readFileSync('ai-output.json', 'utf8'));
            } catch (e) {}

            const missing = JSON.parse(process.env.MISSING || '[]');
            const actionable = process.env.ACTIONABLE === 'true';
            const score = process.env.SCORE;
            const severity = process.env.SEVERITY;
            const reporterType = process.env.REPORTER_TYPE || 'unknown';
            const lookupFailed = process.env.LOOKUP_FAILED === 'true';
            const assignmentStatus = process.env.ASSIGNMENT_STATUS || 'not_evaluated';
            const assignedTo = process.env.ASSIGNED_TO || 'none';

            const body = ai?.reporter_comment || (
              actionable
                ? `Thanks for the report. We have enough information and are proceeding with maintainer triage.`
                : `Thanks for the report. Please add the missing information: ${missing.join(', ')}.`
            );

            const fullComment = [
              '## Automated issue triage',
              '',
              `- Reporter type: **${reporterType}**${lookupFailed ? ' (membership lookup failed)' : ''}`,
              `- Completeness score: **${score}/100**`,
              `- Suggested severity: **${severity}**`,
              `- Actionable: **${actionable ? 'yes' : 'needs more info'}**`,
              `- Assignment: **${assignmentStatus}** (assignee: **${assignedTo}**)`,
              `- Missing fields: **${missing.length ? missing.join(', ') : 'none'}**`,
              '',
              body,
              '',
              '_This is a demo triage workflow using rules with optional AI enrichment._'
            ].join('\n');

            core.setOutput('body', fullComment);

      - name: Comment on issue
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ inputs.issue_number }},
              body: `${{ steps.comment.outputs.body }}`
            });

      - name: Notify Teams (optional)
        if: ${{ env.TEAMS_WEBHOOK_URL != '' }}
        uses: actions/github-script@v7
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
          SCORE: ${{ steps.evaluate.outputs.score }}
          SEVERITY: ${{ steps.evaluate.outputs.severity }}
          MISSING: ${{ steps.evaluate.outputs.missing }}
          ISSUE_URL: ${{ inputs.issue_html_url }}
          ISSUE_TITLE: ${{ inputs.issue_title }}
          ISSUE_USER: ${{ inputs.issue_user_login }}
          REPORTER_TYPE: ${{ steps.reporter.outputs.reporter_type }}
          ASSIGNED_TO: ${{ steps.assignment.outputs.assigned_to }}
        with:
          script: |
            const missing = JSON.parse(process.env.MISSING || '[]');
            const assignedTo = process.env.ASSIGNED_TO || 'none';
            const card = {
              '@type': 'MessageCard',
              '@context': 'http://schema.org/extensions',
              themeColor: '0076D7',
              title: 'Issue triage result',
              sections: [{
                activityTitle: `Issue triaged: [${process.env.ISSUE_TITLE}](${process.env.ISSUE_URL})`,
                facts: [
                  { name: 'Reporter', value: process.env.ISSUE_USER },
                  { name: 'Reporter type', value: process.env.REPORTER_TYPE || 'external' },
                  { name: 'Assigned to', value: assignedTo },
                  { name: 'Score', value: `${process.env.SCORE}/100` },
                  { name: 'Severity', value: process.env.SEVERITY },
                  { name: 'Missing fields', value: missing.length ? missing.join(', ') : 'none' }
                ]
              }]
            };

            await fetch(process.env.TEAMS_WEBHOOK_URL, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(card)
            });
